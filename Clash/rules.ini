[custom]
; ACL4SSR / subconverter style external config
; Local self-hosted subconverter:
;   clash_rule_base=mihomo-converter-base.yaml
; Remote conversion service:
;   upload mihomo-converter-base.yaml somewhere public and replace it with raw URL
clash_rule_base=https://raw.githubusercontent.com/SpeedupMaster/Proxy-Config/main/Clash/converter-base.yaml

enable_rule_generator=true
overwrite_original_rules=true
update_ruleset_on_request=false

; Node groups
custom_proxy_group=🚀 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,5,100
custom_proxy_group=🌐 所有节点`select`.*
custom_proxy_group=🇭🇰 香港节点`url-test`(港|香港|HK|Hong Kong|HongKong)`http://www.gstatic.com/generate_204`300,5,100
custom_proxy_group=🇯🇵 日本节点`url-test`(日|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,5,100
custom_proxy_group=🇺🇸 美国节点`url-test`(美|US|United States|America|Los Angeles|San Jose|Seattle)`http://www.gstatic.com/generate_204`300,5,100
custom_proxy_group=🇩🇪 德国节点`url-test`(德|DE|Germany|Frankfurt|Berlin)`http://www.gstatic.com/generate_204`300,5,100

